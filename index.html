<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LEGADO">
<meta name="theme-color" content="#080d1a">
<title>⚓ LEGADO — App de Liderança</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-icon">⚓</div>
  <div style="font-family:sans-serif;font-size:14px;color:var(--dim)">Carregando LEGADO...</div>
</div>

<div id="app" style="display:none;height:100%;display:none;flex-direction:column">

  <!-- HEADER -->
  <div class="header" id="header">
    <div class="header-top">
      <div>
        <div class="logo">⚓ LEGADO</div>
        <div class="date-sub" id="header-date"></div>
      </div>
      <div id="header-right"></div>
    </div>
    <div class="progress-bars" id="progress-bars" style="display:none"></div>
  </div>

  <!-- SCROLL CONTENT -->
  <div class="scroll" id="main-content"></div>

  <!-- TAB BAR -->
  <div class="tab-bar" id="tab-bar"></div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
